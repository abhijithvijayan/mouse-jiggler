[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
; The ESP32-C3 SuperMini uses native USB. Route Serial to the USB CDC port so
; logs show up over the USB cable (otherwise Serial goes to the UART pins).
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    https://github.com/HijelHub/HijelHID_BLEMouse.git
    h2zero/NimBLE-Arduino@^2.3.8
